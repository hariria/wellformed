name: Docs Pages

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  issues: write
  pull-requests: write

env:
  TURBO_TELEMETRY_DISABLED: 1
  CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME || 'wellformed' }}

concurrency:
  group: docs-pages-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Docs
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    environment:
      name: ${{ github.event_name == 'pull_request' && format('preview/pr-{0}', github.event.pull_request.number) || 'production' }}
      url: ${{ steps.deploy.outputs.pages-deployment-alias-url || steps.deploy.outputs.deployment-url }}
    env:
      CLOUDFLARE_PAGES_BRANCH: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}
      CLOUDFLARE_PAGES_COMMIT_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ env.CLOUDFLARE_PAGES_COMMIT_SHA }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile
        working-directory: typescript

      - name: Build Package
        run: pnpm --filter wellformed-ts build
        working-directory: typescript

      - name: Build Docs
        run: pnpm --filter @wellformed/docs build
        working-directory: typescript

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: typescript/apps/docs
          packageManager: pnpm
          command: >-
            pages deploy build/client
            --project-name=${{ env.CLOUDFLARE_PAGES_PROJECT_NAME }}
            --branch=${{ env.CLOUDFLARE_PAGES_BRANCH }}
            --commit-hash=${{ env.CLOUDFLARE_PAGES_COMMIT_SHA }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Add Deployment Summary
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.pages-deployment-alias-url || steps.deploy.outputs.deployment-url }}
        run: |
          {
            echo "### Cloudflare Pages"
            echo
            echo "- Project: \`${CLOUDFLARE_PAGES_PROJECT_NAME}\`"
            echo "- Branch: \`${CLOUDFLARE_PAGES_BRANCH}\`"
            echo "- Commit: \`${CLOUDFLARE_PAGES_COMMIT_SHA}\`"
            echo "- URL: ${DEPLOYMENT_URL}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment Preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.pages-deployment-alias-url || steps.deploy.outputs.deployment-url }}
        with:
          script: |
            const marker = "<!-- wellformed-cloudflare-pages-preview -->";
            const deploymentUrl = process.env.DEPLOYMENT_URL;
            const commitSha = process.env.CLOUDFLARE_PAGES_COMMIT_SHA;
            const body = [
              marker,
              "### Cloudflare Pages preview",
              "",
              `${context.payload.pull_request.head.ref} is deployed:`,
              "",
              deploymentUrl,
              "",
              `_Updated for commit \`${commitSha}\`._`,
            ].join("\n");

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
