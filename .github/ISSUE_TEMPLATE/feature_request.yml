name: Feature Request
description: Propose an enhancement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Propose a concrete problem and desired outcome.
        Do not include sensitive personal data or security vulnerability details
        in public issues.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the API/behavior you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you considered.
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Links, synthetic examples, or prior art.
